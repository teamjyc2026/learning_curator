<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>러닝큐레이터 · 로고</title>
<meta name="description" content="러닝큐레이터 브랜드 로고 — Learning Curator brand mark."/>
<meta property="og:title" content="러닝큐레이터 · Learning Curator"/>
<meta property="og:description" content="브랜드 로고 가이드"/>
<style>
  :root{
    --indigo:#2E2A78; --violet:#6B5BE6; --coral:#FF6A5B; --amber:#FFB13D;
    --ink:#1C1B2E; --muted:#8A8AA0; --bg:#F6F5F1; --card:#FFFFFF; --dark:#15131F;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;
  }
  .wrap{max-width:920px; margin:0 auto; padding:28px 20px 80px}
  header.top{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 22px}
  .eyebrow{font-size:13px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; font-weight:600}
  .badge{font-size:12px; color:var(--muted); border:1px solid #E4E2DA; border-radius:999px; padding:5px 12px}
  .card{background:var(--card); border:1px solid #ECEAE2; border-radius:22px; padding:34px;
    box-shadow:0 1px 0 rgba(0,0,0,.02)}
  .hero{display:flex; align-items:center; justify-content:center; min-height:200px; padding:46px 24px}
  .hero svg{width:min(560px,86%); height:auto}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px}
  .tile{background:var(--card); border:1px solid #ECEAE2; border-radius:18px; padding:26px;
    display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center}
  .tile .art{display:flex; align-items:center; justify-content:center; min-height:128px}
  .tile svg{max-width:170px; max-height:128px; height:auto; width:auto}
  .tile .label{font-size:13px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .dark{background:var(--dark); border:none; border-radius:22px; padding:46px 24px; margin-top:16px;
    display:flex; align-items:center; justify-content:center}
  .dark svg{width:min(520px,86%); height:auto}
  h2.sec{font-size:14px; letter-spacing:.04em; color:var(--muted); font-weight:700; margin:34px 2px 6px;
    text-transform:uppercase}
  .palette{display:flex; flex-wrap:wrap; gap:12px; margin-top:14px}
  .sw{flex:1 1 120px; min-width:110px}
  .sw .chip{height:54px; border-radius:12px; border:1px solid rgba(0,0,0,.05)}
  .sw .n{font-size:13px; font-weight:600; margin-top:8px}
  .sw .h{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums}
  .dl{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px}
  button.dl-btn{
    border:1px solid #E0DED5; background:#fff; color:var(--ink); font:inherit; font-weight:600;
    font-size:13px; padding:11px 16px; border-radius:12px; cursor:pointer; transition:.15s}
  button.dl-btn:hover{border-color:var(--violet); color:var(--violet); transform:translateY(-1px)}
  footer{margin-top:46px; text-align:center; color:var(--muted); font-size:12.5px}
  .gradtext{background:linear-gradient(90deg,var(--violet),var(--indigo));
    -webkit-background-clip:text; background-clip:text; color:transparent}
  @media(max-width:560px){
    .wrap{padding:20px 14px 64px}
    .card{padding:24px} .grid{grid-template-columns:1fr}
    .hero{padding:32px 12px}
  }
</style>
</head>
